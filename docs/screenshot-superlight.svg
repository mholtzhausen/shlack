  <text x="786" y="236" class="dim">[19:55]</text>
  <text x="838" y="236" class="me titleb">stefan</text>
  <text x="900" y="236" class="fg">making it. recipe link:</text>
  <text x="900" y="252" class="cyan under">https://nyt.cooking/miso-eggplant</text>

