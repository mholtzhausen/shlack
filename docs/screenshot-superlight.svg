<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">
  <style>
    .bg     { fill: #ffffff; }
    .panel  { fill: #ffffff; stroke: #ececec; stroke-width: 1; }
    .focus  { stroke: #2563eb; stroke-width: 1; fill: none; }
    .border { stroke: #ececec; stroke-width: 1; fill: none; }
    .dim    { fill: #b5b5b5; }
    .fg     { fill: #1a1a1a; }
    .muted  { fill: #999999; }
    .blue   { fill: #2563eb; }
    .green  { fill: #15803d; }
    .yellow { fill: #b45309; }
    .red    { fill: #dc2626; }
    .magenta{ fill: #9333ea; }
    .cyan   { fill: #0891b2; }
    .me     { fill: #15803d; }
    .header { fill: #999999; font-weight: 600; letter-spacing: 0.5px; }
    .titleb { font-weight: 600; }
    .bold   { font-weight: 700; }
    .ital   { font-style: italic; }
    .under  { text-decoration: underline; }
    .codebg { fill: #f5f5f5; }
    .codefg { fill: #b45309; }
    .pillm  { fill: #ffffff; font-weight: 600; }
    .pillbg-mention { fill: #2563eb; }
    .pillbg-bcast   { fill: #dc2626; }
    .pillbg-react   { fill: #f0f0f0; }
    .pillrf { fill: #1a1a1a; font-weight: 600; }
    .barbg-red    { fill: #ef4444; }
    .cardbar      { fill: #2563eb; }
    .activerow    { fill: #dbeafe; }
  </style>

  <rect class="bg" width="1280" height="720"/>

