  <text x="908" y="122" class="codefg">▸ 3 tbsp white miso</text>
  <text x="908" y="138" class="codefg">▸ 2 tbsp mirin</text>
  <text x="908" y="154" class="codefg">▸ 1 tbsp sugar</text>
  <text x="908" y="170" class="codefg">→ broil 10 min, cut-side up</text>

  <text x="786" y="208" class="dim">[19:42]</text>
  <text x="838" y="208" class="cyan titleb">yuki</text>
  <text x="900" y="208" class="fg">add a splash of</text>
  <text x="1008" y="208" class="bold fg">_sake_</text>
