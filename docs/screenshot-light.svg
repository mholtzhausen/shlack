<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">
  <style>
    .bg     { fill: #f5f1e8; }
    .panel  { fill: #fbf8f0; stroke: #d8cfb8; stroke-width: 1; }
    .focus  { stroke: #1a73e8; stroke-width: 1; fill: none; }
    .border { stroke: #d8cfb8; stroke-width: 1; fill: none; }
    .dim    { fill: #8a8470; }
    .fg     { fill: #2b2820; }
    .muted  { fill: #6e6957; }
    .blue   { fill: #1a4f9e; }
    .green  { fill: #2f7a3a; }
    .yellow { fill: #b87b00; }
    .red    { fill: #b8362f; }
    .magenta{ fill: #8e3da6; }
    .cyan   { fill: #1a7984; }
    .me     { fill: #2f7a3a; }
    .header { fill: #6e6957; font-weight: 600; letter-spacing: 0.5px; }
    .titleb { font-weight: 600; }
    .bold   { font-weight: 700; }
    .ital   { font-style: italic; }
    .under  { text-decoration: underline; }
    .codebg { fill: #ece6d4; }
    .codefg { fill: #6b4f00; }
    .pillm  { fill: #ffffff; font-weight: 600; }
    .pillbg-mention { fill: #2851a8; }
    .pillbg-bcast   { fill: #b8362f; }
    .pillbg-react   { fill: #d8cfb8; }
    .pillrf { fill: #2b2820; font-weight: 600; }
    .barbg-red    { fill: #c44a44; }
    .cardbar      { fill: #b87b00; }
    .activerow    { fill: #c5d9f5; }
  </style>

  <rect class="bg" width="1280" height="720"/>

